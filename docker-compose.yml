services:
  db:
    image: postgres:16-alpine
    container_name: impostor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: impostor
      POSTGRES_PASSWORD: impostor
      POSTGRES_DB: impostor
    ports:
      - "5432:5432"
    volumes:
      - impostor_pgdata:/var/lib/postgresql/data

volumes:
  impostor_pgdata:
