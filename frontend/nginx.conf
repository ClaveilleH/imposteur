server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Cache long pour les assets versionnés par Vite.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA : toute route inconnue retombe sur index.html (React Router gère ensuite).
  # Note : /api n'arrive jamais ici, Traefik le route directement vers le backend.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
